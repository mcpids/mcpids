    -----BEGIN PRIVATE KEY-----
    REPLACE_ME_BEFORE_DEPLOY
    -----END PRIVATE KEY-----
  sensor.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_ME_BEFORE_DEPLOY
