apiVersion: v1
kind: ConfigMap
metadata:
  name: mcpids-control-plane-config
  namespace: mcpids
data:
  control-plane.yaml: |
    grpc_listen_addr: ":9090"
    http_listen_addr: ":8080"
    database:
      url: ""
      max_conns: 20
      min_conns: 2
      max_conn_lifetime: 30m
      max_conn_idle_time: 5m
    redis:
      url: "redis://mcpids-redis.mcpids.svc.cluster.local:6379"
      pool_size: 20
      dial_timeout: 5s
      read_timeout: 3s
      write_timeout: 3s
    tls:
      enabled: true
      cert_file: "/etc/mcpids/tls/control-plane.crt"
      key_file: "/etc/mcpids/tls/control-plane.key"
      ca_file: "/etc/mcpids/tls/ca.crt"
      mtls_mode: "required"
    auth:
      jwks_url: ""
      issuer: ""
      audience: ""
      allowed_roles: ["admin", "security"]
    rules:
      yaml_paths: []
      reload_interval: 60s
    approvals:
      default_timeout: 5m
      webhook_url: ""
      webhook_secret: ""
    semantic:
      provider: "http"
      endpoint: "http://mcpids-semantic-service.mcpids.svc.cluster.local:8091/classify"
      bearer_token: ""
      model: ""
      timeout: 2s
      fallback_to_stub: true
    telemetry:
      service_name: "mcpids-control-plane"
      prometheus_addr: ":9465"
      log_level: "info"
      log_format: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcpids-gateway-config
  namespace: mcpids
data:
  gateway.yaml: |
    listen_addr: ":8443"
    upstream_url: "http://upstream-mcp.default.svc.cluster.local:3000"
    tenant_id: "00000000-0000-0000-0000-000000000001"
    agent_id: "00000000-0000-0000-0000-000000000002"
    server_id: "00000000-0000-0000-0000-000000000003"
    max_message_size: 4194304
    tls:
      enabled: true
      cert_file: "/etc/mcpids/tls/gateway.crt"
      key_file: "/etc/mcpids/tls/gateway.key"
      ca_file: "/etc/mcpids/tls/ca.crt"
      mtls_mode: "required"
    control_plane:
      address: "mcpids-control-plane.mcpids.svc.cluster.local:9090"
      timeout: 10s
      insecure: false
      bearer_token: ""
      tls:
        enabled: true
        cert_file: "/etc/mcpids/tls/gateway.crt"
        key_file: "/etc/mcpids/tls/gateway.key"
        ca_file: "/etc/mcpids/tls/ca.crt"
        mtls_mode: "required"
    database:
      url: ""
      max_conns: 10
      min_conns: 1
      max_conn_lifetime: 30m
      max_conn_idle_time: 5m
    redis:
      url: "redis://mcpids-redis.mcpids.svc.cluster.local:6379"
      pool_size: 10
      dial_timeout: 5s
      read_timeout: 3s
      write_timeout: 3s
    pipeline:
      max_eval_duration: 100ms
      fail_open: false
      monitor_only_mode: false
      semantic_enabled: true
    semantic:
      provider: "http"
      endpoint: "http://mcpids-semantic-service.mcpids.svc.cluster.local:8091/classify"
      bearer_token: ""
      model: ""
      timeout: 2s
      fallback_to_stub: true
    rules:
      yaml_paths: []
      reload_interval: 60s
    approvals:
      default_timeout: 5m
      webhook_url: ""
      webhook_secret: ""
    telemetry:
      service_name: "mcpids-gateway"
      prometheus_addr: ":9464"
      log_level: "info"
      log_format: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcpids-agent-config
  namespace: mcpids
data:
  agent.yaml: |
    tenant_id: "00000000-0000-0000-0000-000000000001"
    agent_id: "00000000-0000-0000-0000-000000000002"
    agent_name: "cluster-agent"
    policy_refresh_interval: 30s
    control_plane:
      address: "mcpids-control-plane.mcpids.svc.cluster.local:9090"
      timeout: 10s
      insecure: false
      bearer_token: ""
      tls:
        enabled: true
        cert_file: "/etc/mcpids/tls/agent.crt"
        key_file: "/etc/mcpids/tls/agent.key"
        ca_file: "/etc/mcpids/tls/ca.crt"
        mtls_mode: "required"
    database:
      url: ""
      max_conns: 5
      min_conns: 1
      max_conn_lifetime: 30m
      max_conn_idle_time: 5m
    redis:
      url: "redis://mcpids-redis.mcpids.svc.cluster.local:6379"
      pool_size: 5
      dial_timeout: 5s
      read_timeout: 3s
      write_timeout: 3s
    discovery:
      config_paths:
        - "/home/nonroot/.cursor/mcp.json"
        - "/home/nonroot/.claude.json"
        - "/home/nonroot/.config/claude/claude_desktop_config.json"
        - "/home/nonroot/.config/Code/User/settings.json"
      scan_interval: 30s
    wrapper:
      enabled: true
      max_processes: 10
    semantic:
      provider: "http"
      endpoint: "http://mcpids-semantic-service.mcpids.svc.cluster.local:8091/classify"
      bearer_token: ""
      model: ""
      timeout: 2s
      fallback_to_stub: true
    telemetry:
      service_name: "mcpids-agent"
      prometheus_addr: ":9466"
      log_level: "info"
      log_format: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcpids-sensor-config
  namespace: mcpids
data:
  sensor.yaml: |
    tenant_id: "00000000-0000-0000-0000-000000000001"
    agent_id: "00000000-0000-0000-0000-000000000002"
    control_plane:
      address: "mcpids-control-plane.mcpids.svc.cluster.local:9090"
      timeout: 10s
      insecure: false
      bearer_token: ""
      tls:
        enabled: true
        cert_file: "/etc/mcpids/tls/sensor.crt"
        key_file: "/etc/mcpids/tls/sensor.key"
        ca_file: "/etc/mcpids/tls/ca.crt"
        mtls_mode: "required"
    database:
      url: ""
      max_conns: 5
      min_conns: 1
      max_conn_lifetime: 30m
      max_conn_idle_time: 5m
    ebpf:
      enabled: true
      programs_dir: "/opt/mcpids/bpf"
      attach_kprobes: true
      attach_uprobes: false
      event_buffer_size: 1024
    telemetry:
      service_name: "mcpids-sensor"
      prometheus_addr: ":9467"
      log_level: "info"
      log_format: "json"
