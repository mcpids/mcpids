apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpids-semantic-service
  namespace: mcpids
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcpids-semantic-service
  template:
    metadata:
      labels:
        app: mcpids-semantic-service
    spec:
      containers:
        - name: semantic-service
          image: ghcr.io/mcpids/mcpids-semantic-service:latest
          env:
            - name: MCPIDS_SEMANTIC_LISTEN_ADDR
              value: ":8091"
            - name: MCPIDS_SEMANTIC_BACKEND_PROVIDER
              value: "openai"
            - name: MCPIDS_SEMANTIC_BACKEND_MODEL
              value: "gpt-4.1-mini"
            - name: MCPIDS_SEMANTIC_BACKEND_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcpids-runtime-secrets
                  key: semantic-openai-api-key
            - name: MCPIDS_SEMANTIC_BACKEND_FALLBACK_TO_STUB
              value: "true"
          ports:
            - containerPort: 8091
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcpids-semantic-service
  namespace: mcpids
spec:
  selector:
    app: mcpids-semantic-service
  ports:
    - name: http
      port: 8091
      targetPort: 8091
