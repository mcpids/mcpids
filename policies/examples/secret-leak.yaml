id: secret-leak-protection
name: "Secret Leak Protection"
description: "Block tools that return API keys, tokens, or credentials in their output."
mode: enforce
default_decision: allow

rules:
  - id: redact-aws-keys
    name: "Redact AWS access keys in tool responses"
    enabled: true
    priority: 10
    scope:
      methods: [tools/call]
      directions: [outbound]
    conditions:
      - field: "result.text"
        op: regex
        value: 'AKIA[0-9A-Z]{16}'
    action:
      decision: redact
      redactions:
        - field_path: "result.text"
          pattern: 'AKIA[0-9A-Z]{16}'
          replacement: "[AWS_ACCESS_KEY_REDACTED]"
    severity: critical
    tags: [secret-leak, aws]

  - id: redact-github-pat
    name: "Redact GitHub PATs in tool responses"
    enabled: true
    priority: 11
    scope:
      methods: [tools/call]
      directions: [outbound]
    conditions:
      - field: "result.text"
        op: regex
        value: 'ghp_[A-Za-z0-9]{36}'
    action:
      decision: redact
      redactions:
        - field_path: "result.text"
          pattern: 'ghp_[A-Za-z0-9]{36}'
          replacement: "[GITHUB_PAT_REDACTED]"
    severity: critical
    tags: [secret-leak, github]
